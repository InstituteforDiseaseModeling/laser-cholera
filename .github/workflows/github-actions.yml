name: test matrix
on:
  pull_request:
    branches: [ '*' ]
  workflow_dispatch:
    branches: [ '*' ]
  push:
    branches: [ main ]
jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'check'
            tox_env: 'check'
            os: 'ubuntu-latest'
          - name: 'docs'
            tox_env: 'docs'
            os: 'ubuntu-latest'
          - name: 'py312 (ubuntu/x86_64)'
            tox_env: 'py312'
            os: 'ubuntu-latest'
          - name: 'py312 (windows/AMD64)'
            tox_env: 'py312'
            os: 'windows-latest'
          - name: 'py312 (macos/arm64)'
            tox_env: 'py312'
            os: 'macos-latest'

    steps:

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Install UV
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

    - name: regular build and test
      run: uvx --with tox-uv tox -e ${{ matrix.tox_env }} -v
